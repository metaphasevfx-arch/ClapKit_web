<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FFD1D1" />
    <title>Redirecting… | ClapKit</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #ffd1d1 0%, #ff6767 100%);
        color: #fff;
      }
      .card {
        width: min(560px, 92vw);
        padding: 24px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(10px);
      }
      a {
        color: #fff;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.35rem;
      }
      p {
        margin: 0;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Redirecting…</h1>
      <p id="msg">If redirect does not happen, open <a href="/">clapkit.pro</a>.</p>
    </div>

    <script>
      (function () {
        const known = new Set([
          "support",
          "privacy",
          "terms",
          "contact",
          "blog",
          "script-supervisor-app",
          "shooting-report-app",
          "on-set-logging"
        ]);

        const path = window.location.pathname.replace(/^\/+|\/+$/g, "");
        const parts = path.split("/").filter(Boolean);

        if (parts.length === 1 && known.has(parts[0])) {
          const target = `/${parts[0]}/${window.location.search}${window.location.hash}`;
          window.location.replace(target);
          return;
        }

        document.getElementById("msg").innerHTML =
          'Page not found. Open <a href="/">Home</a> or <a href="/support/">Support</a>.';
      })();
    </script>
  </body>
</html>
